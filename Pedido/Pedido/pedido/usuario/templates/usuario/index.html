<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" href="{% static 'pedidos/style.css' %}">
    <title>Producto</title>
</head>
<body>

<header>
    <h1>Panel de Usuario</h1>
</header>

<nav>
    <ul>
        <li><a href="/producto/">Producto</a></li>
        <li><a href="/pago/">Pago</a></li>
        <li><a href="/pedidos/">Pedidos</a></li>
    </ul>
</nav>

<main>
    <h1>Crear Usuario</h1>

        <form action="POST">
            {% csrf_token %}

            <label for="nombreUsu">Nombre del Usuario</label>
            <input type="text" name="nombreUsu" id="nombreUsu"></input><br/>
            
            <label for="email">Email</label>
            <input type="email" name="email" id="email"></input><br/>
        
            <button type="submit">Guardar Usuario</button>
        </form>
</main>

<footer>
    <p>Aplicación creada con Django</p>
</footer>

</body>
</html>
